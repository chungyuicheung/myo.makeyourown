<!-- components/site-header.html -->
<!-- Shared Site Header — copy entire file content into each page's <body> at top -->
<header id="header" class="bg-white/80 backdrop-blur-lg sticky top-0 z-50 shadow-sm transition-all duration-300" data-brand="策略探索家">
  <nav class="container mx-auto px-6 py-4">

    <!-- Desktop Header Layout -->
    <div class="hidden md:flex justify-between items-center" id="desktop-nav">
      <!-- Left: Brand + Back Link -->
      <div class="flex items-center gap-6">
        <a href="INDEX_HREF" class="text-xl font-bold" id="desktop-brand">
          <span id="brand-text">策略探索家</span>
        </a>
        <a href="INDEX_HREF" class="text-sm text-gray-500 hover:text-indigo-600 transition-colors" id="back-link" style="display: none;">
          返回首頁
        </a>
      </div>

      <!-- Center: Navigation Links -->
      <div class="flex items-center gap-2" id="desktop-links">
        <div class="relative group">
          <button class="text-sm px-4 py-1.5 rounded-full transition-colors flex items-center gap-1 text-gray-700 hover:text-indigo-600 hover:bg-gray-100/80 cursor-pointer">
            旅程 <span class="text-xs">▼</span>
          </button>
          <div class="absolute left-0 top-full mt-1 bg-white rounded-lg shadow-lg border py-2 min-w-[180px] hidden group-hover:block z-50" style="border-color: var(--color-rule, #e5e5e0);">
            <a href="TRIP_PREFIX + 'trip/okinawa-trip.html'" class="block px-4 py-2 text-sm hover:bg-gray-50" style="color: var(--color-ink, #333);">沖繩七天</a>
            <a href="TRIP_PREFIX + 'trip/okinawa-food-craft-5days.html'" class="block px-4 py-2 text-sm hover:bg-gray-50" style="color: var(--color-ink, #333);">沖繩美食手作</a>
            <a href="TRIP_PREFIX + 'trip/okinawa-presentation.html'" class="block px-4 py-2 text-sm hover:bg-gray-50" style="color: var(--color-ink, #333);">沖繩簡報</a>
            <a href="TRIP_PREFIX + 'trip/hongkong/2025-07-09-red-incense-burner-peak.html'" class="block px-4 py-2 text-sm hover:bg-gray-50" style="color: var(--color-ink, #333);">香港行山</a>
          </div>
        </div>
        <div class="relative group">
          <button class="text-sm px-4 py-1.5 rounded-full transition-colors flex items-center gap-1 text-gray-700 hover:text-indigo-600 hover:bg-gray-100/80 cursor-pointer">
            文章 <span class="text-xs">▼</span>
          </button>
          <div class="absolute left-0 top-full mt-1 bg-white rounded-lg shadow-lg border py-2 min-w-[180px] hidden group-hover:block z-50" style="border-color: var(--color-rule, #e5e5e0);">
            <a href="BLOG_PREFIX + 'blog/best-wedding-gifts-hk.html'" class="block px-4 py-2 text-sm hover:bg-gray-50" style="color: var(--color-ink, #333);">婚禮禮物</a>
            <a href="BLOG_PREFIX + 'blog/hk-marriage-certificate-size-guide.html'" class="block px-4 py-2 text-sm hover:bg-gray-50" style="color: var(--color-ink, #333);">結婚證書尺寸</a>
            <a href="BLOG_PREFIX + 'blog/hk-marriage-registry-guide.html'" class="block px-4 py-2 text-sm hover:bg-gray-50" style="color: var(--color-ink, #333);">註冊攻略</a>
            <a href="BLOG_PREFIX + 'blog/how-to-preserve-marriage-certificate.html'" class="block px-4 py-2 text-sm hover:bg-gray-50" style="color: var(--color-ink, #333);">Preservation指南</a>
            <a href="BLOG_PREFIX + 'blog/hk-marriage-registration-checklist.html'" class="block px-4 py-2 text-sm hover:bg-gray-50" style="color: var(--color-ink, #333);">婚禮檢查表</a>
          </div>
        </div>
        <a href="TV_HREF" class="text-sm px-4 py-1.5 rounded-full transition-colors text-gray-700 hover:text-indigo-600 hover:bg-gray-100/80">影視</a>
        <a href="FOOD_HREF" class="text-sm px-4 py-1.5 rounded-full transition-colors text-gray-700 hover:text-indigo-600 hover:bg-gray-100/80">美食</a>
        <a href="INDEX_HREF" class="text-sm px-4 py-1.5 rounded-full transition-colors text-gray-700 hover:text-indigo-600 hover:bg-gray-100/80">首頁</a>
      </div>

      <!-- Right: CTA Button (optional) -->
      <div id="desktop-cta" style="display: none;"></div>
    </div>

    <!-- Mobile Header -->
    <div class="flex flex-col items-center md:hidden">
      <div class="flex items-center gap-2 w-full justify-between mb-3">
        <a href="INDEX_HREF" class="text-xl font-bold" id="mobile-brand">
          <span id="mobile-brand-text">策略探索家</span>
        </a>
        <button id="mobile-menu-btn" class="text-gray-700 hover:text-indigo-600 focus:outline-none p-3 min-w-[44px] min-h-[44px] flex items-center justify-center touch-action-manipulation">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></svg>
        </button>
      </div>

      <!-- Mobile Menu (hidden by default) -->
      <div id="mobile-menu" class="hidden w-full mt-3 pb-4 border-t border-gray-200">
        <div class="flex flex-col gap-1 pt-4" id="mobile-links">
          <div class="mobile-dropdown">
            <button class="mobile-dropdown-toggle w-full text-left px-4 py-2 rounded-lg flex items-center justify-between" style="color: var(--color-ink, #333);">
              <span>旅程</span>
              <svg class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div class="mobile-dropdown-content hidden pl-4 flex flex-col gap-1 border-l-2" style="border-color: var(--color-rule, #e5e5e0);">
              <a href="TRIP_PREFIX + 'trip/okinawa-trip.html'" class="px-4 py-2 rounded-lg text-sm" style="color: var(--color-ink, #333);">沖繩七天</a>
              <a href="TRIP_PREFIX + 'trip/okinawa-food-craft-5days.html'" class="px-4 py-2 rounded-lg text-sm" style="color: var(--color-ink, #333);">沖繩美食手作</a>
              <a href="TRIP_PREFIX + 'trip/okinawa-presentation.html'" class="px-4 py-2 rounded-lg text-sm" style="color: var(--color-ink, #333);">沖繩簡報</a>
              <a href="TRIP_PREFIX + 'trip/hongkong/2025-07-09-red-incense-burner-peak.html'" class="px-4 py-2 rounded-lg text-sm" style="color: var(--color-ink, #333);">香港行山</a>
            </div>
          </div>
          <div class="mobile-dropdown">
            <button class="mobile-dropdown-toggle w-full text-left px-4 py-2 rounded-lg flex items-center justify-between" style="color: var(--color-ink, #333);">
              <span>文章</span>
              <svg class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div class="mobile-dropdown-content hidden pl-4 flex flex-col gap-1 border-l-2" style="border-color: var(--color-rule, #e5e5e0);">
              <a href="BLOG_PREFIX + 'blog/best-wedding-gifts-hk.html'" class="px-4 py-2 rounded-lg text-sm" style="color: var(--color-ink, #333);">婚禮禮物</a>
              <a href="BLOG_PREFIX + 'blog/hk-marriage-certificate-size-guide.html'" class="px-4 py-2 rounded-lg text-sm" style="color: var(--color-ink, #333);">結婚證書尺寸</a>
              <a href="BLOG_PREFIX + 'blog/hk-marriage-registry-guide.html'" class="px-4 py-2 rounded-lg text-sm" style="color: var(--color-ink, #333);">註冊攻略</a>
              <a href="BLOG_PREFIX + 'blog/how-to-preserve-marriage-certificate.html'" class="px-4 py-2 rounded-lg text-sm" style="color: var(--color-ink, #333);">Preservation指南</a>
              <a href="BLOG_PREFIX + 'blog/hk-marriage-registration-checklist.html'" class="px-4 py-2 rounded-lg text-sm" style="color: var(--color-ink, #333);">婚禮檢查表</a>
            </div>
          </div>
          <a href="TV_HREF" class="px-4 py-2 rounded-lg" style="color: var(--color-ink, #333);">影視</a>
          <a href="FOOD_HREF" class="px-4 py-2 rounded-lg" style="color: var(--color-ink, #333);">美食</a>
          <a href="INDEX_HREF" class="px-4 py-2 mt-2 text-center rounded-lg" style="background-color: var(--color-accent, #c75a3a); color: #fff;">返回首頁</a>
        </div>
      </div>
    </div>
  </nav>
</header>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('mobile-menu-btn');
  var menu = document.getElementById('mobile-menu');
  if (btn && menu) {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      menu.classList.toggle('hidden');
    });
  }
  document.querySelectorAll('.mobile-dropdown-toggle').forEach(function(toggle) {
    toggle.addEventListener('click', function(e) {
      e.preventDefault();
      var content = toggle.nextElementSibling;
      var arrow = toggle.querySelector('svg');
      if (content) content.classList.toggle('hidden');
      if (arrow) arrow.style.transform = content && content.classList.contains('hidden') ? '' : 'rotate(180deg)';
    });
  });
});
</script>
